# argocd helm 값 (최소). 내부 접근·Traefik 뒤라 insecure. 단일 운영자라 dex/SSO 미사용.
configs:
  params:
    server.insecure: true
# set-once 리소스 — 4파드 합 request 약 500Mi / limit 약 1Gi. evict 방지 목적, 튜닝 대상 아님.
controller:
  resources:
    requests: { cpu: 50m, memory: 200Mi }
    limits:   { cpu: 250m, memory: 448Mi }
server:
  resources:
    requests: { cpu: 25m, memory: 100Mi }
    limits:   { cpu: 100m, memory: 192Mi }
repoServer:
  resources:
    requests: { cpu: 25m, memory: 150Mi }
    limits:   { cpu: 100m, memory: 256Mi }
redis:
  resources:
    requests: { cpu: 10m, memory: 50Mi }
    limits:   { cpu: 50m, memory: 128Mi }
