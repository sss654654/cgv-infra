# cert-manager 자원 (set-once) — 3파드(controller·webhook·cainjector). evict 방지 최소 request.
crds:
  enabled: true                       # install.sh --set에서 이관(값 파일로 일원화)
resources:                            # controller
  requests: { cpu: 50m, memory: 64Mi }
  limits:   { cpu: 200m, memory: 128Mi }
webhook:
  resources:
    requests: { cpu: 50m, memory: 32Mi }
    limits:   { cpu: 100m, memory: 64Mi }
cainjector:
  resources:
    requests: { cpu: 50m, memory: 32Mi }
    limits:   { cpu: 100m, memory: 64Mi }
