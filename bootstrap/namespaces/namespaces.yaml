# 워크로드 네임스페이스 + PodSecurity 라벨(§3 배포규약). argocd는 helm --create-namespace로 별도.
apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: data
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    # ⚠️ node-exporter/alloy(DaemonSet, 호스트 접근)가 restricted에 안 맞음(§검증②).
    # 임시 privileged — 이상적으론 node-exporter를 별도 privileged ns로 격리하고 나머지는 restricted 유지.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
