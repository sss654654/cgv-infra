# k3s 공통 config — 3노드 동일 (/etc/rancher/k3s/config.yaml). 노드배치-cgv.md §1b.
# ★첫 서버에만 주면 2·3이 기본 Flannel+servicelb+traefik으로 떠 네트워킹 충돌 → 반드시 3노드 동일.
flannel-backend: none            # CNI=Calico가 대신 (설치는 cgv-infra/install.sh)
disable-network-policy: true     # NetworkPolicy도 Calico가
disable:
  - servicelb                    # LB=MetalLB가 대신
  - traefik                      # Ingress=자체 Traefik 차트가 대신
# API 서버 인증서 SAN — Phase1(스켈레톤 172.30.1.x) + Phase2(OPNsense 10.0.0.x) 둘 다 미리.
# (Phase2 재형성 시 인증서 안 깨지게. 라이브 IP 변경 대신 재구축이 단순·안전.)
tls-san:
  - 172.30.1.201
  - 172.30.1.202
  - 172.30.1.203
  - 10.0.0.11
  - 10.0.0.12
  - 10.0.0.13
