# AppProject infra — 플랫폼 워크로드(redis · kafka CR · 관측) 울타리.
# data·observability 네임스페이스, cluster-scoped 허용.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  description: CGV 플랫폼 워크로드 (redis · kafka CR · 관측)
  sourceRepos:
    - https://gitlab.cgv.local/cgv/cgv-infra.git
    - https://grafana-community.github.io/helm-charts   # 관측 업스트림 차트(멀티소스) 허용
    - https://grafana.github.io/helm-charts
    - https://charts.min.io/
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: data
    - server: https://kubernetes.default.svc
      namespace: observability
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
