# AppProject secrets — SealedSecret 배달 전용 울타리.
# sealed-secrets App이 쓰던 project: default(전권)를 대체 — 배달 대상 ns 3개 + SealedSecret 리소스로 한정.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"          # sealed-secrets App(wave -2)보다 먼저 존재해야 참조 가능
spec:
  description: SealedSecret 배달 (workloads/manifests/secrets)
  sourceRepos:
    - https://github.com/sss654654/cgv-infra.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: data
    - server: https://kubernetes.default.svc
      namespace: app
    - server: https://kubernetes.default.svc
      namespace: observability
  namespaceResourceWhitelist:
    - group: bitnami.com
      kind: SealedSecret
