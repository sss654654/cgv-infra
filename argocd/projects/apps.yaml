# AppProject apps — 우리 코드 워크로드(queue/booking/frontend) 울타리(가드레일).
# 한 파일 = 한 blast radius. app 네임스페이스·namespaced-only.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"   # apps ApplicationSet이 만드는 앱(wave 3)보다 프로젝트가 먼저 존재
spec:
  description: CGV 앱 워크로드 (queue/booking/frontend)
  sourceRepos:
    - https://github.com/sss654654/cgv-infra.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: app
  clusterResourceWhitelist: []            # 앱은 cluster-scoped 금지
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
