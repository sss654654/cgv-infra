# SealedSecret 배달 — 봉인 매니페스트(workloads/manifests/secrets/*.yaml)를 sync-wave -2로(앱보다 먼저).
# 각 SealedSecret이 자기 metadata.namespace를 명시 → secrets 프로젝트가 ns 3개·SealedSecret로 한정(projects/secrets.yaml).
# ⚠️ 봉인 파일이 아직 없으면 0개 sync(무해). 배포 전 README대로 kubeseal 실행.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: secrets
  source:
    repoURL: https://github.com/sss654654/cgv-infra.git
    targetRevision: main
    path: workloads/manifests/secrets
    directory:
      recurse: true
      include: '*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
