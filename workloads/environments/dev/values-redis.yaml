# redis dev 환경값 — 서브차트(bitnami)로 전달. Sentinel HA(auth on). 리소스=실측 전 추정.
# sentinel 모드: node StatefulSet은 replica.*, sentinel 컨테이너는 sentinel.resources로 governed.
redis:
  replica:
    resources:                                  # 단일스레드 CPU 병목: limit 1000m = 부하테스트 종점(상한 도달 = 최대 처리량)
      requests: { cpu: 250m, memory: 256Mi }
      limits:   { cpu: "1", memory: 512Mi }
  sentinel:
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 100m, memory: 128Mi }
  metrics:
    resources:                                  # exporter nano preset(128/192)이 과해 축소
      requests: { cpu: 50m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 64Mi }

# sealedSecret.encryptedPassword 는 sealed-secrets 컨트롤러 up 후 kubeseal 출력값을 여기 주입:
# sealedSecret:
#   encryptedPassword: "AgB...(kubeseal 출력)"
