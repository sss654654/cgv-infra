# charts/app — 제네릭 앱 차트 기본값.
# 오버라이드 순서: 이 파일 → apps/<name>/values.yaml(정체성) → envs/<env>/values-<name>.yaml(환경).
# 뒤가 이김. 맵은 deep merge, 배열은 통째 교체.

replicaCount: 1

image:
  repository: ""            # 인스턴스가 지정 (예: registry/queue-go)
  tag: ""                   # env가 지정 (예: dev)
  pullPolicy: IfNotPresent

imagePullSecrets: []

# 앱 리슨 포트. 프로브·Service가 이름 http로 참조.
containerPort: 8080

service:
  enabled: true
  type: ClusterIP
  port: 80                  # 인스턴스가 앱 포트로 지정

# 메트릭 스크레이프 (§6 Path B: ServiceMonitor/PodMonitor + Alloy).
#  kind=ServiceMonitor : 본 앱 포트의 path를 긁음 (booking /actuator/prometheus).
#  kind=PodMonitor     : 별도 컨테이너 포트를 긁음 (queue 9091, Service 안 물림).
metrics:
  enabled: false
  kind: ServiceMonitor
  containerPort: 0          # PodMonitor일 때 노출할 별도 포트 (0=미노출)
  path: /metrics
  interval: 15s

serviceAccount:
  create: true
  name: ""

# PodSecurity restricted 충족.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop: ["ALL"]
  # runAsUser 는 인스턴스가 지정 (이미지별 uid)

resources: {}             # env가 requests/limits 지정

livenessProbe:
  httpGet: { path: /healthz, port: http }
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet: { path: /ready, port: http }
  initialDelaySeconds: 5
  periodSeconds: 5

startupProbe: {}          # 느린 기동(JVM)용. 인스턴스가 지정하면 liveness/readiness는 기동 후 시작.

terminationGracePeriodSeconds: null   # k8s 기본 30. graceful 긴 앱(booking)이 늘림.

lifecycle: {}             # 인스턴스가 지정 (예: preStop sleep)

env: {}                   # 이름->값 맵 (env 파일에서 채움)
envFrom: []               # secretRef/configMapRef 리스트 (SealedSecret 등)

volumes: []               # readOnlyRootFilesystem 쓰기 경로용 emptyDir 등
volumeMounts: []

# 배치·가용성 (§노드배치). 인스턴스가 지정.
nodeSelector: {}                    # 데이터 싱글턴 핀 (예: {cgv.io/data: obj})
affinity: {}
topologySpreadConstraints: []       # replica를 노드에 분산(maxSkew/hostname)
priorityClassName: ""
podDisruptionBudget:
  enabled: false                    # HA 앱(replica≥2)만 켜기
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70   # threshold는 실측 후 확정

ingress:
  enabled: false
  className: traefik
  annotations: {}
  host: ""                # env가 지정 (dev는 비워 path-only, prd는 도메인). 스칼라라 배열 함정 없음.
  paths: []               # identity가 지정 [{path, pathType, service, port}]
  tls: []

migration:
  enabled: false          # booking DDL none + 배포 Job (PreSync)
  command: []

partOf: cgv
