# grafana/alloy 1.10.1 (Alloy v1.17.1) — DaemonSet 수집기. 관측의 심장.
# 파이프라인: 파드 로그 → Loki / ServiceMonitor·PodMonitor 스크레이프 → Mimir remote_write / (선택)OTLP → Tempo.
# clustering ON 필수 — DaemonSet 3파드가 target을 gossip으로 샤딩(안 하면 3배 중복 수집).
# ServiceMonitor/PodMonitor CRD는 이 차트가 설치하지 않음 → bootstrap의 prometheus-operator-crds가 제공해야 함.
# push URL은 형제 차트의 게이트웨이 서비스명 가정 — 배포 후 확인(특히 mimir-gateway). SealedSecret 불필요(내부 http 무인증).
# 트레이스 블록은 선택 — 앱이 Tempo로 직접 전송하면 otelcol 블록+extraPorts 삭제.
controller:
  type: daemonset
rbac: { create: true }
serviceAccount: { create: true }
crds: { create: false }
alloy:
  clustering: { enabled: true }
  mounts: { varlog: false, dockercontainers: false }
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { memory: 512Mi }
  extraPorts:
    - { name: otlp-grpc, port: 4317, targetPort: 4317, protocol: TCP }
    - { name: otlp-http, port: 4318, targetPort: 4318, protocol: TCP }
  configMap:
    create: true
    content: |-
      // LOGS: 파드 stdout -> Loki
      discovery.kubernetes "pods" { role = "pod" }
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule { source_labels = ["__meta_kubernetes_namespace"]           target_label = "namespace" }
        rule { source_labels = ["__meta_kubernetes_pod_name"]            target_label = "pod" }
        rule { source_labels = ["__meta_kubernetes_pod_container_name"]  target_label = "container" }
        rule { source_labels = ["__meta_kubernetes_pod_node_name"]       target_label = "node" }
        rule { source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"] target_label = "app" }
      }
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
        clustering { enabled = true }
      }
      loki.write "default" {
        endpoint { url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push" }
      }

      // METRICS: ServiceMonitor + PodMonitor -> Mimir remote_write
      prometheus.operator.servicemonitors "scrape" {
        forward_to = [prometheus.remote_write.mimir.receiver]
        clustering { enabled = true }
      }
      prometheus.operator.podmonitors "scrape" {
        forward_to = [prometheus.remote_write.mimir.receiver]
        clustering { enabled = true }
      }
      prometheus.remote_write "mimir" {
        endpoint { url = "http://mimir-gateway.observability.svc.cluster.local/api/v1/push" }
      }

      // TRACES (선택): OTLP 수신 -> Tempo. 앱이 Tempo 직접 전송이면 이 두 블록 삭제.
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output { traces = [otelcol.exporter.otlp.tempo.input] }
      }
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.observability.svc.cluster.local:4317"
          tls { insecure = true }
        }
      }
