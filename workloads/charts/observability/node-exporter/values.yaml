# prometheus-community/prometheus-node-exporter 4.56.1 (node_exporter 1.12.1) — 노드 OS 메트릭(DaemonSet).
# node_filesystem_* 로 용도별 LV 마운트포인트 관측. ServiceMonitor → Alloy가 각 노드 IP:9100 직접 스크레이프 → Mimir.
# hostNetwork/hostPID/hostPath 필수 → restricted·baseline PSA 위반, privileged만 가능.
#   → observability 네임스페이스 enforce=privileged로 처리함(bootstrap/namespaces). values로는 못 고침.
resources:                           # 경량 발행기(DaemonSet ×3). request 부여로 evict 우선순위 방어
  requests: { cpu: 50m, memory: 64Mi }
  limits:   { cpu: 200m, memory: 128Mi }
prometheus:
  monitor:
    enabled: true
