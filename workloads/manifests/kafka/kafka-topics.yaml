# KafkaTopic CR — 토픽 소유권을 GitOps로 관리. auto-create 대신 명시 선언.
# admissions: queue→booking(입장 발행) / bookings-completed: booking→queue(완료 → ZREM).
# partitions 4 = HPA max 4와 짝 — 동시 소비 파드 ≤ 파티션 수(파티션 1이면 HPA 켜도 병렬 소비 0).
#   전역 순서는 포기 — 키 파티셔닝 전제(같은 키는 같은 파티션 = 파티션 내 순서만 보장).
#   파티션은 늘리기만 가능(줄이기 불가)라 넉넉히 4. RF 3 = 브로커 하나 죽어도 유지.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: admissions
  namespace: data
  labels:
    strimzi.io/cluster: cgv
spec:
  partitions: 4
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: bookings-completed
  namespace: data
  labels:
    strimzi.io/cluster: cgv
spec:
  partitions: 4
  replicas: 3
