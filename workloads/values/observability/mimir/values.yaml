# grafana/mimir-distributed 6.1.0 (Mimir 3.1.2) — ★monolithic 모드 없음(조사 확인).
# 최소 마이크로서비스(각 replicas=1, single-zone) + classic 아키텍처(Kafka ingest-storage off) + 외부 MinIO.
# ★크레덴셜: mimir-minio-credentials(SealedSecret) 필요, 키명 MIMIR_S3_ACCESS_KEY_ID / MIMIR_S3_SECRET_ACCESS_KEY.
# ★버킷 "mimir" MinIO에 사전 생성 필요(자동생성 안 함). 게이트웨이 서비스명(mimir-nginx vs mimir-gateway)은 버전 의존 — 배포 후 확인.
minio: { enabled: false }
kafka: { enabled: false }
rollout_operator: { enabled: false }
mimir:
  structuredConfig:
    ingest_storage:
      enabled: false
      kafka: { address: null, topic: null, auto_create_topic_default_partitions: null }
    distributor: { remote_timeout: null }
    ingester:
      push_grpc_method_enabled: null
      ring: { replication_factor: 1 }        # 단일 ingester → RF=1 필수
    common:
      storage:
        backend: s3
        s3:
          endpoint: minio.observability.svc.cluster.local:9000
          bucket_name: mimir
          access_key_id: ${MIMIR_S3_ACCESS_KEY_ID}
          secret_access_key: ${MIMIR_S3_SECRET_ACCESS_KEY}
          insecure: true
    blocks_storage: { storage_prefix: blocks }     # 한 버킷을 prefix로 3분할(충돌 방지)
    ruler_storage: { storage_prefix: ruler }
    alertmanager_storage: { storage_prefix: alertmanager }
global:
  extraEnvFrom:
    - secretRef:
        name: mimir-minio-credentials
distributor: { replicas: 1 }
ingester: { replicas: 1, zoneAwareReplication: { enabled: false }, persistentVolume: { storageClass: local-path } }
querier: { replicas: 1 }
query_frontend: { replicas: 1 }
query_scheduler: { replicas: 1 }
store_gateway: { replicas: 1, zoneAwareReplication: { enabled: false }, persistentVolume: { storageClass: local-path } }
compactor: { replicas: 1, persistentVolume: { storageClass: local-path } }
ruler: { replicas: 1 }
alertmanager: { replicas: 1, zoneAwareReplication: { enabled: false }, persistentVolume: { storageClass: local-path } }
overrides_exporter: { replicas: 1 }
gateway: { replicas: 1 }
