# grafana-community/loki 18.5.0 (OSS Loki 3.7.3) — Monolithic(단일바이너리) + MinIO S3.
# ★리포 변경(조사 확인): OSS loki 차트가 grafana/helm-charts → grafana-community/helm-charts로 포크됨(2026-03).
#   grafana/loki 7.x는 GEL(엔터프라이즈)로 전환. → obs-appset이 grafana-community를 가리킴.
# ★크레덴셜: values엔 평문 없음. loki-s3-credentials(SealedSecret) 필요, 키명 정확히 AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY.
# helm template 검증 완료(StatefulSet 1 + gateway 1, memcached/canary 없음).
deploymentMode: Monolithic
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
    s3:
      endpoint: minio.observability.svc.cluster.local:9000
      insecure: true
      s3ForcePathStyle: true
      # accessKeyId/secretAccessKey 생략 → AWS SDK 기본 체인이 env(AWS_ACCESS_KEY_ID/SECRET)에서 읽음
singleBinary:
  replicas: 1
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
gateway:
  enabled: true
  replicas: 1
# Monolithic이라도 SSD 타겟 기본 3 → validate.yaml이 0으로 안 내리면 거부(필수).
read: { replicas: 0 }
write: { replicas: 0 }
backend: { replicas: 0 }
# 홈랩: 무거운 옵션 끔.
chunksCache: { enabled: false }
resultsCache: { enabled: false }
lokiCanary: { enabled: false }
test: { enabled: false }
minio: { enabled: false }
