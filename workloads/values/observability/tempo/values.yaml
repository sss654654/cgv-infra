# grafana/tempo 1.24.4 (Tempo 2.9.0) — Single Binary(monolithic) + MinIO S3.
# ★차트 deprecated(2026-01 grafana-community로 이관 예정) — monolithic은 이게 유일, 지금은 정상. 이관 후 소스 전환 검토.
# ★HTTP API 포트 = 3200 (3100 아님! 3100은 Loki). OTLP 수신 4317(gRPC)/4318(HTTP).
# ★크레덴셜: tempo-s3-credentials(SealedSecret) 필요, 키명 S3_ACCESS_KEY / S3_SECRET_KEY (expand-env로 확장).
# ★버킷 "tempo" MinIO에 사전 생성 필요. jaeger receiver는 차트 버그로 못 끔(4317/4318만 사용, 나머지 무해).
replicas: 1
tempo:
  reportingEnabled: false
  extraArgs:
    "config.expand-env": "true"
  extraEnvFrom:
    - secretRef:
        name: tempo-s3-credentials
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo
        endpoint: minio.observability.svc.cluster.local:9000
        access_key: ${S3_ACCESS_KEY}
        secret_key: ${S3_SECRET_KEY}
        insecure: true
        forcepathstyle: true
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc: { endpoint: "0.0.0.0:4317" }
        http: { endpoint: "0.0.0.0:4318" }
persistence:
  enabled: true
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  size: 10Gi
