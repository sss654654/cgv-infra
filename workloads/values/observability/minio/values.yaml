# minio/minio 5.4.0 — standalone 단일노드 오브젝트스토어 = Loki/Mimir/Tempo의 S3 백엔드.
# ★기본 메모리 request 16Gi(홈랩 스케줄 불가) → 512Mi로 낮춤.
# ★루트 크레덴셜: minio-root-secret(SealedSecret) 필요, 키 rootUser / rootPassword (rootPassword 8자+).
# ★fullnameOverride=minio → 서비스 minio.observability.svc:9000 (릴리스명 무관 고정).
fullnameOverride: minio
mode: standalone
nodeSelector:
  cgv.io/data: obj                 # miniodata LV(100GB)가 있는 k3s-3에 핀
existingSecret: minio-root-secret
persistence:
  enabled: true
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 10Gi
resources:
  requests:
    memory: 512Mi
# 백엔드 버킷 3개 사전 생성(post-install hook Job, mc mb). Loki/Mimir/Tempo가 이걸 씀.
buckets:
  - { name: loki,  policy: none, purge: false }
  - { name: mimir, policy: none, purge: false }
  - { name: tempo, policy: none, purge: false }
users: []                            # 기본 console/console123 유저 비활성
