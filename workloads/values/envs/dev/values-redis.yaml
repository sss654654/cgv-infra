# redis dev 환경값 — 서브차트(bitnami)로 전달. 리소스=실측 전 추정.
redis:
  master:
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }
  replica:
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }

