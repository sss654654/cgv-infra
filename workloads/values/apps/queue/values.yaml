# queue (Go) 인스턴스 정체성 — env 무관 (image·포트·프로브·메트릭·보안).
# 근거 = cgv-onprem/queue-go (config.go PORT 8090 / handler/health.go / Dockerfile nonroot).

image:
  repository: registry.cgv.local/queue-go   # env가 tag 지정

containerPort: 8090        # config.go PORT 기본 8090

service:
  port: 8090

# 메트릭 = 별도 포트 9091(/metrics, promauto). Service엔 안 물림 → PodMonitor로 파드 직접 스크레이프.
metrics:
  enabled: true
  kind: PodMonitor
  containerPort: 9091
  path: /metrics
  interval: 15s

# distroless :nonroot = uid 65532. readOnlyRootFilesystem=true (Go 정적, 디스크 쓰기 없음).
securityContext:
  runAsUser: 65532
  runAsGroup: 65532

# health.go: /health/live(liveness), /health/ready(readiness=Redis PING) — 앱 포트.
livenessProbe:
  httpGet: { path: /health/live, port: http }
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet: { path: /health/ready, port: http }
  initialDelaySeconds: 3
  periodSeconds: 5

# main.go가 SIGTERM 드레인. preStop sleep로 Endpoints 명단 전파 유예(§2-D).
# distroless엔 sleep 바이너리 없음 → k8s 네이티브 sleep 액션(1.30+).
lifecycle:
  preStop:
    sleep:
      seconds: 5
terminationGracePeriodSeconds: 45     # preStop 5 + drain 20 + 자원정리 여유

# replica 분산 + 드레인 시 최소 1 가용
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: queue
podDisruptionBudget:
  enabled: true
  minAvailable: 1

partOf: cgv
